<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 页面不存在</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .num {
            font-size: 120px;
            font-weight: 700;
            color: #2d3748;
            line-height: 1;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            color: #4a5568;
            margin-bottom: 12px;
        }
        .text {
            font-size: 16px;
            color: #718096;
            margin-bottom: 40px;
        }
        .back-btn {
            padding: 12px 36px;
            background: #2d3748;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="num">404</div>
        <div class="title">抱歉，您访问的页面不存在</div>
        <div class="text">页面已迁移或地址输入错误，请返回主页重新浏览</div>
        <a href="https://rzmc.cc.cd" class="back-btn">跳转网页</a>
    </div>
</body>
</html>
